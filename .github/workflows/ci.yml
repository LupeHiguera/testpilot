name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck)
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Build dashboard
        run: npm run ui:build

      - name: Install Playwright Chromium
        run: npm run playwright:install -- --with-deps

      - name: End-to-end demo (mock mode)
        run: npm run testpilot -- demo --mode mock

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testpilot-runs
          path: runs/
          if-no-files-found: ignore
          retention-days: 7
